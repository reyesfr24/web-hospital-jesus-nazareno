        - paragraph [ref=e47]: Desde 1819
        - heading "Nuestra Historia" [level=2] [ref=e48]
        - paragraph [ref=e50]: Más de dos siglos de vocación de servicio, guiados por la fe cristiana y el amor a los más necesitados.
      - generic [ref=e52]:
        - generic [ref=e53]:
          - generic [ref=e54]:
            - heading "El origen cristiano" [level=3] [ref=e55]
            - paragraph [ref=e56]:
              - text: El Hospital de Jesús Nazareno tiene su origen en la figura de
              - strong [ref=e57]: don Bernardo Moreno de Pedrajas (1745–1818)
              - text: ", sacerdote y vicario de la parroquia de San Miguel Arcángel. En una época especialmente dura, caracterizada por crisis económicas, hambrunas y epidemias, don Bernardo entendió la caridad cristiana como una forma de vida."
            - paragraph [ref=e58]: Gracias a una gestión austera de su patrimonio, destinó sus bienes a aliviar el sufrimiento de los pobres, enfermos y desamparados. Esta vocación culminó en su testamento (1817–1818), donde dejó dispuesto el nacimiento del Hospital de Jesús Nazareno.
          - generic [ref=e59]:
            - heading "Modernización y compromiso actual" [level=3] [ref=e60]
            - paragraph [ref=e61]: Entre 1999 y 2007 se llevaron a cabo importantes obras de reforma que culminaron con la construcción del edificio actual, concebido para albergar una residencia de personas mayores con instalaciones modernas, accesibles y funcionales.
            - paragraph [ref=e62]:
              - text: Hoy, el hospital sigue caminando fiel a su origen cristiano, implementando el modelo de
              - strong [ref=e63]: Atención Centrada en la Persona (ACP)
              - text: ", que sitúa a cada residente en el centro del cuidado, respetando sus gustos, preferencias, historia de vida y decisiones."
        - img "Cuidado con humanidad en el Hospital de Jesús Nazareno" [ref=e68]
    - generic [ref=e71]:
      - generic [ref=e73]:
        - paragraph [ref=e74]: Atención Centrada en la Persona
        - heading "Nuestros Servicios" [level=2] [ref=e75]
        - paragraph [ref=e77]: Cuidado integral y personalizado que respeta la historia de vida, los valores y las preferencias de cada residente.
      - generic [ref=e79]:
        - generic [ref=e81]:
          - img [ref=e83]
          - heading "Psicología y Trabajo Social" [level=3] [ref=e85]
          - paragraph [ref=e86]: Escuchamos, acompañamos y respetamos los ritmos personales. Trabajamos desde la historia de vida, los valores y las preferencias de cada residente.
          - blockquote [ref=e87]: "\"ACP significa comprender antes de intervenir.\""
        - generic [ref=e89]:
          - img [ref=e91]
          - heading "Enfermería" [level=3] [ref=e93]
          - paragraph [ref=e94]: Seguimiento continuo del estado de salud, ajustando cuidados y medicación. Se prioriza el confort, la seguridad y la dignidad.
          - blockquote [ref=e95]: "\"La atención sanitaria también puede ser cercana y humana.\""
        - generic [ref=e97]:
          - img [ref=e99]
          - heading "Fisioterapia" [level=3] [ref=e101]
          - paragraph [ref=e102]: Intervención individual teniendo en cuenta capacidades, deseos y objetivos. Fomento del movimiento funcional y prevención de caídas.
          - blockquote [ref=e103]: "\"En ACP, el objetivo es la calidad de vida.\""
        - generic [ref=e105]:
          - img [ref=e107]
          - heading "Terapia Ocupacional" [level=3] [ref=e109]
          - paragraph [ref=e110]: Actividades basadas en intereses, hábitos y roles previos, fomentando la participación activa y la toma de decisiones.
          - blockquote [ref=e111]: "\"La persona elige, participa y decide.\""
        - generic [ref=e113]:
          - img [ref=e115]
          - heading "Gerocultores y Cuidadores" [level=3] [ref=e117]
          - paragraph [ref=e118]: Atención diaria respetando preferencias, rutinas y tiempos personales. El vínculo humano y el trato cercano son la base del cuidado.
          - blockquote [ref=e119]: "\"Cuidar no es hacer por la persona, es hacer con ella.\""
        - generic [ref=e121]:
          - img [ref=e123]
          - heading "Cocina" [level=3] [ref=e125]
          - paragraph [ref=e126]: Alimentación adaptada a las necesidades de salud, pero también a los gustos, costumbres y preferencias personales.
          - blockquote [ref=e127]: "\"En ACP, la comida no es solo nutrición.\""
