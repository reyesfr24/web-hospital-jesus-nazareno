        - paragraph [ref=e45]: Desde 1819
        - heading "Nuestra Historia" [level=2] [ref=e46]
        - paragraph [ref=e48]: Más de dos siglos de vocación de servicio, guiados por la fe cristiana y el amor a los más necesitados.
      - generic [ref=e50]:
        - generic [ref=e51]:
          - generic [ref=e52]:
            - heading "El origen cristiano" [level=3] [ref=e53]
            - paragraph [ref=e54]:
              - text: El Hospital de Jesús Nazareno tiene su origen en la figura de
              - strong [ref=e55]: don Bernardo Moreno de Pedrajas (1745–1818)
              - text: ", sacerdote y vicario de la parroquia de San Miguel Arcángel. En una época especialmente dura, caracterizada por crisis económicas, hambrunas y epidemias, don Bernardo entendió la caridad cristiana como una forma de vida."
            - paragraph [ref=e56]: Gracias a una gestión austera de su patrimonio, destinó sus bienes a aliviar el sufrimiento de los pobres, enfermos y desamparados. Esta vocación culminó en su testamento (1817–1818), donde dejó dispuesto el nacimiento del Hospital de Jesús Nazareno.
          - generic [ref=e57]:
            - heading "Modernización y compromiso actual" [level=3] [ref=e58]
            - paragraph [ref=e59]: Entre 1999 y 2007 se llevaron a cabo importantes obras de reforma que culminaron con la construcción del edificio actual, concebido para albergar una residencia de personas mayores con instalaciones modernas, accesibles y funcionales.
            - paragraph [ref=e60]:
              - text: Hoy, el hospital sigue caminando fiel a su origen cristiano, implementando el modelo de
              - strong [ref=e61]: Atención Centrada en la Persona (ACP)
              - text: ", que sitúa a cada residente en el centro del cuidado, respetando sus gustos, preferencias, historia de vida y decisiones."
        - img "Cuidado con humanidad en el Hospital de Jesús Nazareno" [ref=e66]
    - generic [ref=e69]:
      - generic [ref=e71]:
        - paragraph [ref=e72]: Atención Centrada en la Persona
        - heading "Nuestros Servicios" [level=2] [ref=e73]
        - paragraph [ref=e75]: Cuidado integral y personalizado que respeta la historia de vida, los valores y las preferencias de cada residente.
      - generic [ref=e77]:
        - generic [ref=e79]:
          - img [ref=e81]
          - heading "Psicología y Trabajo Social" [level=3] [ref=e83]
          - paragraph [ref=e84]: Escuchamos, acompañamos y respetamos los ritmos personales. Trabajamos desde la historia de vida, los valores y las preferencias de cada residente.
          - blockquote [ref=e85]: "\"ACP significa comprender antes de intervenir.\""
        - generic [ref=e87]:
          - img [ref=e89]
          - heading "Enfermería" [level=3] [ref=e91]
          - paragraph [ref=e92]: Seguimiento continuo del estado de salud, ajustando cuidados y medicación. Se prioriza el confort, la seguridad y la dignidad.
          - blockquote [ref=e93]: "\"La atención sanitaria también puede ser cercana y humana.\""
        - generic [ref=e95]:
          - img [ref=e97]
          - heading "Fisioterapia" [level=3] [ref=e99]
          - paragraph [ref=e100]: Intervención individual teniendo en cuenta capacidades, deseos y objetivos. Fomento del movimiento funcional y prevención de caídas.
          - blockquote [ref=e101]: "\"En ACP, el objetivo es la calidad de vida.\""
        - generic [ref=e103]:
          - img [ref=e105]
          - heading "Terapia Ocupacional" [level=3] [ref=e107]
          - paragraph [ref=e108]: Actividades basadas en intereses, hábitos y roles previos, fomentando la participación activa y la toma de decisiones.
          - blockquote [ref=e109]: "\"La persona elige, participa y decide.\""
        - generic [ref=e111]:
          - img [ref=e113]
          - heading "Gerocultores y Cuidadores" [level=3] [ref=e115]
          - paragraph [ref=e116]: Atención diaria respetando preferencias, rutinas y tiempos personales. El vínculo humano y el trato cercano son la base del cuidado.
          - blockquote [ref=e117]: "\"Cuidar no es hacer por la persona, es hacer con ella.\""
        - generic [ref=e119]:
          - img [ref=e121]
          - heading "Cocina" [level=3] [ref=e123]
          - paragraph [ref=e124]: Alimentación adaptada a las necesidades de salud, pero también a los gustos, costumbres y preferencias personales.
          - blockquote [ref=e125]: "\"En ACP, la comida no es solo nutrición.\""
